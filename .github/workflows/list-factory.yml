name: List factory (autonomous)

# Runs every 4 hours. Pops the head of data/_queue/niches.json, generates the
# Top 11 list for that niche via Gemini/Claude, commits, DEPLOYS to Vercel
# (deterministic — GitHub→Vercel auto-deploy is unreliable on this project),
# then pings IndexNow so new pages get crawled fast.
# Default 2 niches/run × 6 runs/day = up to 12 new lists/day.

on:
  schedule:
    - cron: "17 */4 * * *"
  workflow_dispatch:
    inputs:
      count:
        description: "How many niches to process this run (1-4)"
        required: false
        default: "2"

permissions:
  contents: write

jobs:
  produce:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: team_oEv2jNzUwbHWI1N6lMhsOh86
      VERCEL_PROJECT_ID: prj_aNAcywzzJZK5QYucfPeTulZyqGMe
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with: { node-version: "20" }

      - name: Install deps
        run: |
          npm install --silent --no-audit --no-fund
          npm install --silent --no-save @anthropic-ai/sdk

      - name: Generate list(s)
        run: |
          set -e
          COUNT="${{ github.event.inputs.count }}"
          COUNT="${COUNT:-2}"
          for i in $(seq 1 "$COUNT"); do
            echo "=== Iteration $i / $COUNT ==="
            node scripts/generate-list.mjs || true
          done

      - name: Commit + push (if anything changed)
        id: commit
        run: |
          git config user.email "list-factory@topelevens.com"
          git config user.name "Top 11 List Factory"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "list-factory: produce $(date -u +%Y-%m-%d) batch"
            git pull --rebase origin main
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No changes to commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Vercel (production)
        if: steps.commit.outputs.changed == 'true'
        timeout-minutes: 8
        run: npx -y vercel@latest --prod --yes --token "$VERCEL_TOKEN"

      - name: Ping IndexNow (new pages)
        if: steps.commit.outputs.changed == 'true'
        run: node scripts/indexnow-push.mjs || true
